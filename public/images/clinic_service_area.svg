<svg width="1200" height="1000" viewBox="0 0 1200 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F4F2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D0E8E5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1000" fill="url(#bgGrad)"/>

  <!-- Grid -->
  <g stroke="#CCDDDB" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="1000"/>
    <line x1="300" y1="0" x2="300" y2="1000"/>
    <line x1="900" y1="0" x2="900" y2="1000"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="750" x2="1200" y2="750"/>
  </g>

  <!-- 16km Radius Circle (filled) -->
  <circle cx="600" cy="500" r="280" fill="#FF4444" opacity="0.15" stroke="none"/>

  <!-- 16km Radius Circle (outline) -->
  <circle cx="600" cy="500" r="280" fill="none" stroke="#FF2222" stroke-width="4" opacity="0.8"/>

  <!-- Clinic Position Marker -->
  <g filter="url(#shadow)">
    <circle cx="600" cy="500" r="18" fill="#FF0000" stroke="#CC0000" stroke-width="3"/>
    <circle cx="600" cy="500" r="25" fill="none" stroke="#FF0000" stroke-width="2" opacity="0.4"/>
  </g>

  <!-- Clinic Label Background -->
  <rect x="450" y="550" width="300" height="100" rx="12" fill="white" stroke="#FF2222" stroke-width="2" opacity="0.95" filter="url(#shadow)"/>

  <!-- Clinic Label Text -->
  <text x="600" y="575" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#000">Clinic</text>
  <text x="600" y="600" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#FF2222">うめむら半蔵門内科歯科</text>
  <text x="600" y="625" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">千代田区平河町</text>

  <!-- 16km Annotation -->
  <g filter="url(#shadow)">
    <rect x="750" y="280" width="160" height="50" rx="8" fill="white" stroke="#FF2222" stroke-width="2" opacity="0.95"/>
    <text x="830" y="315" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#FF2222">16 km radius</text>
  </g>

  <!-- Title -->
  <g>
    <text x="600" y="50" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#1a5a56">Service Area</text>
    <text x="600" y="90" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#2f746f">訪問診療対応エリア（16km圏内）</text>
  </g>

  <!-- Compass indicator -->
  <g opacity="0.6">
    <text x="80" y="120" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#666">N</text>
    <line x1="80" y1="130" x2="80" y2="160" stroke="#666" stroke-width="2"/>
  </g>

  <!-- Bottom note -->
  <text x="600" y="970" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#999">
    ※ 法令上の16km圏内を対象としております
  </text>
</svg>
